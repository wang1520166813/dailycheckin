name: Baidu Tieba Check-in

on:
  schedule:
    # 每天北京时间 09:00 (UTC 01:00) 执行，与 B站错开
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  tieba:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Create config.json for Tieba
        run: |
          python -c "
import json
import os

# 从环境变量获取 Cookie (GitHub Actions 会自动将 Secret 注入为环境变量)
cookie = os.environ.get('BAIDU_TIEBA_COOKIES', '')

if not cookie:
    print('Error: BAIDU_TIEBA_COOKIES is empty!')
    exit(1)

config = {
    'BAIDU': [
        {
            'cookie': cookie,
            'checkin': True
        }
    ]
}

with open('config.json', 'w', encoding='utf-8') as f:
    json.dump(config, f, indent=2, ensure_ascii=False)

print('Tieba Config created:')
with open('config.json', 'r', encoding='utf-8') as f:
    print(f.read())
"
        env:
          BAIDU_TIEBA_COOKIES: ${{ secrets.BAIDU_TIEBA_COOKIES }}

      - name: Run Tieba Check-in
        run: |
          dailycheckin --include TIEBA

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tieba-logs
          path: logs/
