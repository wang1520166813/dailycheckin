name: Daily Check-in

on:
  schedule:
    # 每天北京时间 08:30 (UTC 00:30) 执行
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Create config.json
        run: |
          cat > config.json << 'EOF'
          {
            "BILIBILI": [
              {
                "cookie": "SESSDATA=${{ secrets.BILI_SESSDATA }}; bili_jct=${{ secrets.BILI_BILI_JCT }}; DedeUserID=${{ secrets.BILI_DedeUserID }}; buvid3=${{ secrets.BILI_buvid3 }}; buvid4=${{ secrets.BILI_buvid4 }}",
                "coin_num": 5,
                "coin_type": 1,
                "my_video_bvid": "${{ secrets.BILI_BV_ID }}",
                "coins_to_myself": 2,
                "silver2coin": false
              }
            ]
          }
          EOF
          echo "Config created:"
          cat config.json

      - name: Run check-in
        run: |
          dailycheckin

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-logs
          path: logs/
