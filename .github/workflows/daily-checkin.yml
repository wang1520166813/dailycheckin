name: Daily Check-in

on:
  schedule:
    # 每天北京时间 08:30 (UTC 00:30) 执行
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run check-in
        env:
          # B 站 Cookie
          BILI_SESSDATA: ${{ secrets.BILI_SESSDATA }}
          BILI_BILI_JCT: ${{ secrets.BILI_BILI_JCT }}
          BILI_DedeUserID: ${{ secrets.BILI_DedeUserID }}
          BILI_buvid3: ${{ secrets.BILI_buvid3 }}
          BILI_buvid4: ${{ secrets.BILI_buvid4 }}
          
          # 其他平台 Cookie (可选)
          # BAIDU_TIEBA_COOKIE: ${{ secrets.BAIDU_TIEBA_COOKIE }}
          # IQIYI_COOKIE: ${{ secrets.IQIYI_COOKIE }}
          # SMZDM_COOKIE: ${{ secrets.SMZDM_COOKIE }}
          
          # 消息推送 (可选)
          # SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
          # PUSH_PLUS_TOKEN: ${{ secrets.PUSH_PLUS_TOKEN }}
          
        run: |
          python main.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-logs
          path: logs/
